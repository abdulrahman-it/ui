<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - منصة الاستشارات التقنية</title>
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            
            <!-- Step 1: Register Form -->
            <form id="registerForm">
                <!-- Logo & Titles -->
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>
                    <h1 class="auth-title">منصة الاستشارات</h1>
                    <p class="auth-subtitle" id="registerSubtitle">إنشاء حساب جديد للانضمام لمنصة الاستشارات الأكاديمية</p>
                </div>

                <div class="form-group">
                    <label for="regName" class="form-label">الاسم الكامل</label>
                    <div class="input-wrapper">
                        <input type="text" id="regName" name="fullName" class="form-control" placeholder="أدخل اسمك الكامل" required>
                        <i class="fa-regular fa-user input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regEmail" class="form-label">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <input type="email" id="regEmail" name="email" class="form-control" placeholder="أدخل بريدك الإلكتروني" required>
                        <i class="fa-regular fa-envelope input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regPhone" class="form-label">رقم الهاتف</label>
                    <div class="input-wrapper">
                        <input type="tel" id="regPhone" name="phone" class="form-control" placeholder="أدخل رقم هاتفك" required>
                        <i class="fa-solid fa-phone input-icon"></i>
                    </div>
                </div>


                <!-- حقول الطالب -->
                <div id="studentFields">
                    <div class="form-group">
                        <label for="studentUniversity" class="form-label">الجامعة</label>
                        <div class="input-wrapper">
                            <input type="text" id="studentUniversity" name="university" class="form-control" placeholder="أدخل اسم جامعتك">
                            <i class="fa-solid fa-building-columns input-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="studentCollege" class="form-label">الكلية</label>
                        <div class="input-wrapper">
                            <input type="text" id="studentCollege" name="college" class="form-control" placeholder="أدخل اسم كليتك">
                            <i class="fa-solid fa-school input-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="studentMajor" class="form-label">التخصص</label>
                        <div class="input-wrapper">
                            <input type="text" id="studentMajor" name="major" class="form-control" placeholder="أدخل تخصصك الدراسي">
                            <i class="fa-solid fa-book input-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="studentLevel" class="form-label">المستوى الدراسي</label>
                        <div class="input-wrapper">
                            <select id="studentLevel" name="level" class="form-control" style="appearance: none; -webkit-appearance: none;">
                                <option value="" disabled selected>اختر مستواك الدراسي</option>
                                <option value="1">المستوى الأول</option>
                                <option value="2">المستوى الثاني</option>
                                <option value="3">المستوى الثالث</option>
                                <option value="4">المستوى الرابع</option>
                                <option value="5">المستوى الخامس</option>
                                <option value="6">المستوى السادس</option>
                                <option value="7">المستوى السابع</option>
                                <option value="8">المستوى الثامن</option>
                                <option value="masters">ماجستير</option>
                                <option value="phd">دكتوراه</option>
                            </select>
                            <i class="fa-solid fa-layer-group input-icon"></i>
                        </div>
                    </div>
                </div>

                <!-- حقول المستشار -->
                <div id="consultantFields" style="display: none;">
                    <div class="form-group">
                        <label for="consultantSpecialty" class="form-label">التخصص</label>
                        <div class="input-wrapper">
                            <select id="consultantSpecialty" name="specialty" class="form-control" style="appearance: none; -webkit-appearance: none;">
                                <option value="" disabled selected>اختر تخصصك</option>
                                <option value="ai">ذكاء اصطناعي (AI)</option>
                                <option value="cyber">أمن سيبراني (Cyber Security)</option>
                                <option value="it">تقنية معلومات (IT)</option>
                                <option value="data">علوم البيانات (Data Science)</option>
                                <option value="software">هندسة البرمجيات</option>
                                <option value="networks">شبكات الحاسب</option>
                            </select>
                            <i class="fa-solid fa-microchip input-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="consultantDegree" class="form-label">الدرجة العلمية</label>
                        <div class="input-wrapper">
                            <select id="consultantDegree" name="degree" class="form-control" style="appearance: none; -webkit-appearance: none;">
                                <option value="" disabled selected>اختر درجتك العلمية</option>
                                <option value="bachelor">بكالوريوس</option>
                                <option value="masters">ماجستير</option>
                                <option value="phd">دكتوراه</option>
                                <option value="professor">أستاذ جامعي</option>
                            </select>
                            <i class="fa-solid fa-graduation-cap input-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="consultantExperience" class="form-label">سنوات الخبرة</label>
                        <div class="input-wrapper">
                            <input type="number" id="consultantExperience" name="experience" class="form-control" placeholder="عدد سنوات الخبرة" min="0" max="60">
                            <i class="fa-solid fa-briefcase input-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="consultantBio" class="form-label">نبذة تعريفية</label>
                        <div class="input-wrapper">
                            <textarea id="consultantBio" name="bio" class="form-control" placeholder="اكتب نبذة مختصرة عن خبراتك وتخصصك" rows="3" style="border-radius: 16px; resize: none; padding-top: 14px;"></textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="consultantPrice" class="form-label">سعر الاستشارة (بالريال)</label>
                        <div class="input-wrapper">
                            <input type="number" id="consultantPrice" name="price" class="form-control" placeholder="أدخل سعر الجلسة الواحدة" min="0">
                            <i class="fa-solid fa-tag input-icon"></i>
                        </div>
                    </div>
                </div>
                
                <div class="form-group text-start" dir="rtl">
                    <label class="form-label mb-2 d-block text-right" style="text-align: right;">طريقة التحقق المفضلة</label>
                    <div class="d-flex justify-content-start gap-4" style="direction: rtl;">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="verifyMethod" id="verifyEmail" value="email" checked>
                            <label class="form-check-label" for="verifyEmail">بريد إلكتروني</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="verifyMethod" id="verifyPhone" value="phone">
                            <label class="form-check-label" for="verifyPhone">رقم هاتف</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regPassword" class="form-label">كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" id="regPassword" name="password" class="form-control" placeholder="أدخل كلمة المرور" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword" class="form-label">تأكيد كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" id="regConfirmPassword" name="confirmPassword" class="form-control" placeholder="تأكيد كلمة المرور" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="registerBtn">
                    <span>إنشاء حساب</span>
                    <div class="spinner-border spinner-border-sm ms-2" style="display: none;" role="status"></div>
                </button>
                
                <div class="auth-footer">
                    <span>لديك حساب بالفعل؟;</span>
                    <a href="login.html" class="auth-link">تسجيل الدخول</a>
                </div>
                <div style="margin-top: 12px; text-align: center;">
                    <a href="choose-account.html" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: none;">
                        <i class="fa-solid fa-arrow-right-long" style="margin-left: 4px;"></i>
                        تغيير نوع الحساب
                    </a>
                </div>
            </form>

            <!-- Step 2: Verification -->
            <div id="verificationStep" class="verification-step" style="display: none;">
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <h1 class="auth-title" id="verifyTitle">التحقق من الحساب</h1>
                    <p class="auth-subtitle" id="verifyMessage">تم إرسال رمز التحقق إلى بريدك الإلكتروني.</p>
                </div>
                
                <form id="verifyForm">
                    <div class="form-group text-center">
                        <label class="form-label mb-3">أدخل رمز التحقق (1234)</label>
                        <div class="verification-code-group" dir="ltr">
                            <input type="text" class="verify-box" maxlength="1" required autocomplete="off">
                            <input type="text" class="verify-box" maxlength="1" required autocomplete="off">
                            <input type="text" class="verify-box" maxlength="1" required autocomplete="off">
                            <input type="text" class="verify-box" maxlength="1" required autocomplete="off">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>تحقق</span>
                    </button>
                </form>
            </div>

            <!-- Step 3: Success State -->
            <div id="successStep" class="verification-step text-center" style="display: none;">
                <div class="success-icon mb-4">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h1 class="auth-title mb-3">تهانينا!</h1>
                <p class="auth-subtitle mb-4">تم إنشاء حسابك في منصة الاستشارات التقنية بنجاح</p>
                <a href="login.html" class="btn-primary d-block text-decoration-none">
                    <span>اذهب إلى صفحة تسجيل الدخول</span>
                </a>
            </div>

        </div>
    </div>
    <script>
        // ── Read account type from URL ──
        const urlParams   = new URLSearchParams(window.location.search);
        const accountType = urlParams.get('type') || 'student';

        const studentFields    = document.getElementById('studentFields');
        const consultantFields = document.getElementById('consultantFields');
        const subtitle         = document.getElementById('registerSubtitle');

        if (accountType === 'consultant') {
            studentFields.style.display    = 'none';
            consultantFields.style.display = 'block';
            subtitle.textContent = 'إنشاء حساب مستشار لتقديم خبراتك الأكاديمية للطلاب';
        } else {
            studentFields.style.display    = 'block';
            consultantFields.style.display = 'none';
            subtitle.textContent = 'إنشاء حساب طالب للوصول إلى الاستشارات الأكاديمية';
        }

        // ── Step 1: Register → Verification ──
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn     = document.getElementById('registerBtn');
            const spinner = btn.querySelector('.spinner-border');

            btn.disabled          = true;
            spinner.style.display = 'inline-block';

            setTimeout(function() {
                document.getElementById('registerForm').style.display    = 'none';
                document.getElementById('verificationStep').style.display = 'block';
                btn.disabled          = false;
                spinner.style.display = 'none';
            }, 800);
        });

        // ── Step 2: Verification → Success ──
        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('verificationStep').style.display = 'none';
            document.getElementById('successStep').style.display      = 'block';
        });
    </script>
    <script src="js/script.js"></script>
</body>
</html>
