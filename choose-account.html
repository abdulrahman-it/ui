<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختر نوع حسابك - منصة الاستشارات الأكاديمية</title>
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Project CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        /* ── Page layout ── */
        .choose-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #d9e2ec 100%);
            padding: 40px 20px;
        }

        /* ── Header block ── */
        .choose-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .choose-logo {
            font-size: 2.5rem;
            color: var(--accent-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 191, 166, 0.1);
            width: 84px;
            height: 84px;
            border-radius: 22px;
            margin-bottom: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .choose-logo:hover {
            background: var(--accent-color);
            color: #fff;
            transform: rotate(0deg) scale(1.08);
            box-shadow: 0 12px 28px rgba(0, 191, 166, 0.25);
        }

        .choose-title {
            color: var(--primary-color);
            font-size: 1.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .choose-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            max-width: 440px;
            margin: 0 auto;
        }

        /* ── Cards grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
            width: 100%;
            max-width: 780px;
        }

        /* ── Single account card ── */
        .account-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 44px 36px;
            text-align: center;
            border: 2px solid transparent;
            box-shadow: 0 8px 30px rgba(18, 34, 48, 0.07);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        /* Subtle top-accent bar */
        .account-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-color);
            transform: scaleX(0);
            transition: transform 0.35s ease;
            border-radius: 24px 24px 0 0;
        }

        .account-card:hover::before,
        .account-card:focus::before {
            transform: scaleX(1);
        }

        .account-card:hover,
        .account-card:focus {
            border-color: var(--accent-color);
            box-shadow: 0 16px 48px rgba(0, 191, 166, 0.18);
            transform: translateY(-6px);
        }

        /* Icon bubble */
        .card-icon {
            font-size: 2.6rem;
            width: 88px;
            height: 88px;
            border-radius: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            transition: all 0.35s ease;
        }

        .card-icon.student {
            background: rgba(0, 191, 166, 0.1);
            color: var(--accent-color);
        }

        .card-icon.consultant {
            background: rgba(30, 43, 58, 0.08);
            color: var(--primary-color);
        }

        .account-card:hover .card-icon.student {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 8px 20px rgba(0, 191, 166, 0.3);
        }

        .account-card:hover .card-icon.consultant {
            background: var(--primary-color);
            color: #fff;
            box-shadow: 0 8px 20px rgba(30, 43, 58, 0.25);
        }

        .card-type {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        .card-desc {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.65;
            margin-bottom: 30px;
            min-height: 56px;
        }

        /* CTA button inside card */
        .card-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: 52px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .card-btn.student-btn {
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 6px 18px rgba(0, 191, 166, 0.25);
        }

        .card-btn.student-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 10px 24px rgba(0, 191, 166, 0.35);
            transform: translateY(-2px);
        }

        .card-btn.consultant-btn {
            background: var(--primary-color);
            color: #fff;
            box-shadow: 0 6px 18px rgba(30, 43, 58, 0.18);
        }

        .card-btn.consultant-btn:hover {
            background: #151e28;
            box-shadow: 0 10px 24px rgba(30, 43, 58, 0.3);
            transform: translateY(-2px);
        }

        /* Back to login link */
        .back-link {
            margin-top: 36px;
            font-size: 0.92rem;
            color: var(--text-muted);
            text-align: center;
        }

        .back-link a {
            color: var(--accent-color);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.25s;
        }

        .back-link a:hover {
            color: var(--primary-color);
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .cards-grid {
                grid-template-columns: 1fr;
                max-width: 400px;
            }

            .choose-title {
                font-size: 1.5rem;
            }

            .account-card {
                padding: 36px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="choose-wrapper">

        <!-- Header -->
        <div class="choose-header">
            <div class="choose-logo">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1 class="choose-title">مرحباً بك في منصة الاستشارات الأكاديمية</h1>
            <p class="choose-subtitle">اختر نوع الحساب الذي ترغب بإنشائه للمتابعة.</p>
        </div>

        <!-- Cards -->
        <div class="cards-grid">

            <!-- Student Card -->
            <a href="register.html?type=student" class="account-card">
                <div class="card-icon student">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2 class="card-type">طالب</h2>
                <p class="card-desc">احصل على استشارات أكاديمية ومساعدة في مشاريع التخرج والأبحاث.</p>
                <span class="card-btn student-btn">
                    متابعة كطالب
                    <i class="fa-solid fa-arrow-left"></i>
                </span>
            </a>

            <!-- Consultant Card -->
            <a href="register.html?type=consultant" class="account-card">
                <div class="card-icon consultant">
                    <i class="fa-solid fa-chalkboard-user"></i>
                </div>
                <h2 class="card-type">مستشار</h2>
                <p class="card-desc">قدّم خبراتك الأكاديمية وساعد الطلاب من خلال الاستشارات المتخصصة.</p>
                <span class="card-btn consultant-btn">
                    متابعة كمستشار
                    <i class="fa-solid fa-arrow-left"></i>
                </span>
            </a>

        </div>

        <!-- Back link -->
        <p class="back-link">
            لديك حساب بالفعل؟
            <a href="login.html">تسجيل الدخول</a>
        </p>

    </div>
</body>
</html>
